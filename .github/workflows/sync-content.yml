name: Sync events & gallery

on:
  schedule:
    # Daily at 13:00 UTC (~6am/7am Boise time, depending on DST).
    - cron: "0 13 * * *"
  push:
    branches: [main]
    paths:
      - "images/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Regenerate events & gallery
        run: uv run scripts/sync_content.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html calendar.html
          if git diff --staged --quiet; then
            echo "Nothing changed."
          else
            git commit -m "Sync upcoming events & gallery"
            git push
          fi
